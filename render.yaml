services:
  - type: web
    name: health-advisor-api
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./apps/agent-api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: FALLBACK_ONLY_MODE
        value: "true"
      - key: ENABLE_GOD_MODE
        value: "true"
