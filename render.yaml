services:
  - type: web
    name: health-advisor-api
    env: node
    region: singapore
    plan: free
    buildCommand: pnpm install && pnpm --filter @health-advisor/agent-api... build
    startCommand: pnpm --filter @health-advisor/agent-api start
    rootDir: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "23"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: FALLBACK_ONLY_MODE
        value: "true"
      - key: ENABLE_GOD_MODE
        value: "true"
